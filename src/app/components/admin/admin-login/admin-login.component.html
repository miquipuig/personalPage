<section class="admin-auth section-show">
  <div class="admin-card">
    <h2 class="admin-title">Blog Admin</h2>
    <p class="admin-subtitle">Sign in with an authorized Google account to manage the blog.</p>

    <div class="signin-wrap">
      <asl-google-signin-button type="standard" size="large"></asl-google-signin-button>
    </div>

    <div class="admin-loading" *ngIf="loading">Checking authorization…</div>

    <div class="admin-error" *ngIf="errorMessage">{{ errorMessage }}</div>
  </div>
</section>
