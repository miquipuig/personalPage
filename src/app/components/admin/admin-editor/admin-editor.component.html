<section class="admin-editor section-show" [hidden]="showPreview">
  <div class="admin-editor-inner">
    <header class="editor-header">
      <h2>{{ id ? 'Edit post' : 'New post' }}</h2>
      <div class="header-actions">
        <button type="button" class="btn btn-outline" (click)="cancel()">Cancel</button>
        <button type="button" class="btn btn-outline" (click)="openPreview()">Preview</button>
        <button type="button" class="btn btn-primary" (click)="save()" [disabled]="saving">
          {{ saving ? 'Saving…' : 'Save' }}
        </button>
      </div>
    </header>

    <div class="admin-error" *ngIf="error">{{ error }}</div>

    <div class="form-grid">
      <div class="meta-grid">
        <label class="field ar-title">
          <span class="field-label">Title</span>
          <input type="text" class="field-input" [(ngModel)]="title" name="title" placeholder="Post title" />
        </label>

        <label class="field ar-tags">
          <span class="field-label">Tags</span>
          <input type="text" class="field-input" [(ngModel)]="tags" name="tags" placeholder="comma, separated, tags" />
        </label>

        <label class="field ar-excerpt">
          <span class="field-label">Excerpt</span>
          <textarea class="field-input" [(ngModel)]="excerpt" name="excerpt" rows="3"
            placeholder="Short summary shown in listings"></textarea>
        </label>

        <div class="field ar-cover">
          <span class="field-label">Cover image</span>
          <input type="text" class="field-input" [(ngModel)]="coverImage" name="coverImage"
            placeholder="/api/uploads/... or external URL" />
          <div class="cover-upload">
            <button type="button" class="btn btn-outline" (click)="mediaPicker.show('cover')">Choose from library</button>
            <button type="button" class="btn btn-outline" *ngIf="coverImage" (click)="coverImage=''">Remove</button>
          </div>
          <img class="cover-preview" *ngIf="coverImage" [src]="coverImage" alt="cover preview" />
        </div>

        <label class="field ar-date">
          <span class="field-label">Publish date</span>
          <input type="date" class="field-input" [(ngModel)]="publishDate" name="publishDate" />
          <span class="muted">Leave empty to use today's date when publishing.</span>
        </label>

        <label class="field checkbox-field ar-pub">
          <input type="checkbox" [(ngModel)]="published" name="published" />
          <span class="field-label">Published</span>
        </label>
      </div>

      <div class="field">
        <span class="field-label">Content</span>
        <div class="editor-toolbar">
          <div class="tb-group">
            <button type="button" class="tb-btn" title="Bold" aria-label="Bold" (click)="toggleBold()"><i class="bi bi-type-bold"></i></button>
            <button type="button" class="tb-btn" title="Italic" aria-label="Italic" (click)="toggleItalic()"><i class="bi bi-type-italic"></i></button>
            <button type="button" class="tb-btn" title="Strikethrough" aria-label="Strikethrough" (click)="toggleStrike()"><i class="bi bi-type-strikethrough"></i></button>
            <button type="button" class="tb-btn" title="Inline code" aria-label="Inline code" (click)="toggleInlineCode()"><i class="bi bi-code-slash"></i></button>
          </div>
          <div class="tb-group">
            <button type="button" class="tb-btn" title="Heading 1" aria-label="Heading 1" (click)="heading(1)"><i class="bi bi-type-h1"></i></button>
            <button type="button" class="tb-btn" title="Heading 2" aria-label="Heading 2" (click)="heading(2)"><i class="bi bi-type-h2"></i></button>
            <button type="button" class="tb-btn" title="Heading 3" aria-label="Heading 3" (click)="heading(3)"><i class="bi bi-type-h3"></i></button>
            <button type="button" class="tb-btn" title="Paragraph" aria-label="Paragraph" (click)="paragraph()"><i class="bi bi-text-paragraph"></i></button>
          </div>
          <div class="tb-group">
            <button type="button" class="tb-btn" title="Bullet list" aria-label="Bullet list" (click)="bulletList()"><i class="bi bi-list-ul"></i></button>
            <button type="button" class="tb-btn" title="Numbered list" aria-label="Numbered list" (click)="orderedList()"><i class="bi bi-list-ol"></i></button>
            <button type="button" class="tb-btn" title="Quote" aria-label="Quote" (click)="quote()"><i class="bi bi-quote"></i></button>
          </div>
          <div class="tb-group">
            <button type="button" class="tb-btn" title="Link" aria-label="Link" (click)="openLinkMenu($event)"><i class="bi bi-link-45deg"></i></button>
            <div class="tb-table-wrap">
              <button type="button" class="tb-btn" title="Table" aria-label="Table" (click)="toggleTableGrid()"><i class="bi bi-table"></i></button>
              <div class="tg-backdrop" *ngIf="showTableGrid" (click)="showTableGrid=false"></div>
              <div class="table-grid-pop" *ngIf="showTableGrid" (mouseleave)="hoverR=0;hoverC=0">
                <div class="tg-grid">
                  <div class="tg-row" *ngFor="let r of gridArr">
                    <div class="tg-cell" *ngFor="let c of gridArr"
                      [class.on]="r <= hoverR && c <= hoverC"
                      (mouseenter)="hoverR=r; hoverC=c"
                      (click)="pickTable(r, c)"></div>
                  </div>
                </div>
                <div class="tg-label">{{ hoverC }} &times; {{ hoverR }}</div>
              </div>
            </div>
            <button type="button" class="tb-btn" title="Horizontal rule" aria-label="Horizontal rule" (click)="horizontalRule()"><i class="bi bi-dash-lg"></i></button>
            <button type="button" class="tb-btn" title="Line break" aria-label="Line break" (click)="lineBreak()"><i class="bi bi-arrow-return-left"></i></button>
          </div>
          <div class="tb-group">
            <button type="button" class="tb-btn" title="Insert image" aria-label="Insert image" (click)="mediaPicker.show('insert')"><i class="bi bi-image"></i></button>
            <button type="button" class="tb-btn" title="Insert code block" aria-label="Insert code block" (click)="insertCode()"><i class="bi bi-code-square"></i></button>
          </div>
        </div>

        <div class="milkdown-host" #editorEl></div>
      </div>
    </div>
  </div>

  <!-- Floating toolbar anchored to the selected element -->
  <div class="float-tools" *ngIf="floatKind && !showLinkMenu" [style.top.px]="floatTop" [style.left.px]="floatLeft"
    (mousedown)="$event.preventDefault()">

    <ng-container *ngIf="floatKind === 'image'">
      <button type="button" class="ft-btn" *ngFor="let s of imgSizes"
        [class.on]="selImg && selImg.width === s.value" (click)="setImgSize(s.value)">{{ s.label }}</button>
      <input type="text" class="ft-input" [ngModel]="selImg?.alt" name="ftAlt"
        (mousedown)="$event.stopPropagation()" (ngModelChange)="setImgAlt($event)" placeholder="alt text" />
      <button type="button" class="ft-btn ft-danger" title="Delete image" (click)="removeImg()"><i class="bi bi-trash"></i></button>
    </ng-container>

    <ng-container *ngIf="floatKind === 'table'">
      <button type="button" class="ft-btn" title="Add row above" (click)="addRowAbove()">+Row↑</button>
      <button type="button" class="ft-btn" title="Add row below" (click)="addRowBelow()">+Row↓</button>
      <button type="button" class="ft-btn" title="Add column left" (click)="addColLeft()">+Col←</button>
      <button type="button" class="ft-btn" title="Add column right" (click)="addColRight()">+Col→</button>
      <button type="button" class="ft-btn" title="Delete row" (click)="deleteRow()">−Row</button>
      <button type="button" class="ft-btn" title="Delete column" (click)="deleteColumn()">−Col</button>
      <button type="button" class="ft-btn ft-danger" title="Delete table" (click)="deleteTable()"><i class="bi bi-trash"></i></button>
    </ng-container>

    <ng-container *ngIf="floatKind === 'text'">
      <button type="button" class="ft-btn" title="Bold" (click)="toggleBold()"><i class="bi bi-type-bold"></i></button>
      <button type="button" class="ft-btn" title="Italic" (click)="toggleItalic()"><i class="bi bi-type-italic"></i></button>
      <button type="button" class="ft-btn" title="Strikethrough" (click)="toggleStrike()"><i class="bi bi-type-strikethrough"></i></button>
      <button type="button" class="ft-btn" title="Inline code" (click)="toggleInlineCode()"><i class="bi bi-code-slash"></i></button>
      <button type="button" class="ft-btn" title="Link" (click)="openLinkMenu()"><i class="bi bi-link-45deg"></i></button>
    </ng-container>
  </div>

  <!-- Link editor popover -->
  <div class="link-backdrop" *ngIf="showLinkMenu" (click)="cancelLinkMenu()"></div>
  <div class="link-pop" *ngIf="showLinkMenu" [style.top.px]="linkTop" [style.left.px]="linkLeft"
    (mousedown)="$event.stopPropagation()">
    <input #linkInput type="url" class="link-input" [(ngModel)]="linkUrl" name="linkUrl"
      placeholder="https://example.com" (keydown.enter)="applyLink()" (keydown.escape)="cancelLinkMenu()" />
    <button type="button" class="ft-btn" (click)="applyLink()">Apply</button>
    <button type="button" class="ft-btn ft-danger" (click)="removeLink()">Remove</button>
  </div>

  <app-media-picker #mediaPicker (insert)="onInsertImage($event)" (cover)="onSelectCover($event)"></app-media-picker>
</section>

<section class="admin-preview section-show" *ngIf="showPreview">
  <div class="about-me container c_custom">
    <div class="preview-bar">
      <button type="button" class="btn btn-outline" (click)="closePreview()">&larr; Back to editor</button>
      <span class="preview-flag">Preview — not published</span>
    </div>
    <app-post-view
      [preview]="true"
      [title]="title"
      [publishedAt]="previewDate"
      [readingMinutes]="previewReadingMinutes"
      [coverImage]="coverImage"
      [bodyHtml]="previewHtml"
      [tags]="previewTags"
      [relatedPosts]="previewRelated">
    </app-post-view>
  </div>
</section>
