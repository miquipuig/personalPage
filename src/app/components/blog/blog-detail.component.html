<div class="reading-progress" *ngIf="post" [style.width.%]="readingProgress"></div>
<section id="blog" class="about" [ngClass]="{'section-show': isSectionActive}">
  <div class="about-me container c_custom">
    <app-post-view *ngIf="post"
      [title]="post.title"
      [publishedAt]="post.publishedAt"
      [readingMinutes]="readingMinutes"
      [coverImage]="post.coverImage"
      [bodyHtml]="html"
      [tags]="post.tags"
      [translations]="translations"
      [relatedPosts]="relatedPosts">
    </app-post-view>

    <div class="post-not-found" *ngIf="loaded && notFound">
      <h1>Post not found</h1>
      <p>The post you are looking for does not exist.</p>
      <a routerLink="/blog" class="back-link">&larr; Back to Blog</a>
    </div>
  </div>
</section><!-- End Blog Detail Section -->
